<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--f:'DM Sans',sans-serif;--m:'DM Mono',monospace;--bg:#1c1830;--bg1:#231f3a;--bg2:#2c2748;--bg3:#373059;--bg4:#443a6a;--bd:rgba(167,139,250,.14);--bd2:rgba(167,139,250,.26);--dv:rgba(255,255,255,.06);--t:#f0ecff;--t2:#b0a4cc;--mu:#7a6da0;--a:#8b5cf6;--a2:#a78bfa;--a3:#c4b5fd;--gl:rgba(167,139,250,.14);--gr:#34d399;--re:#f87171;--or:#fbbf24}
body.light{--bg:#f4f1ff;--bg1:#ece8ff;--bg2:#fff;--bg3:#ede9ff;--bg4:#ddd7f5;--bd:rgba(139,92,246,.14);--bd2:rgba(139,92,246,.25);--dv:rgba(0,0,0,.06);--t:#1a1030;--t2:#4a3d70;--mu:#9585b8;--gl:rgba(139,92,246,.1)}
body.light #tb{background:var(--bg1)}body.light .mo{background:#fff}body.light .mi{background:var(--bg3);color:var(--t)}body.light .toast{background:rgba(255,255,255,.97);color:var(--t)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:var(--f);color:var(--t);overflow:hidden}
#app{height:100%;min-height:-webkit-fill-available;width:100%;max-width:430px;margin:0 auto;display:flex;flex-direction:column;position:relative;overflow:hidden;background:var(--bg)}
#app::before{content:'';position:fixed;top:-80px;left:50%;transform:translateX(-50%);width:300px;height:200px;background:radial-gradient(ellipse,rgba(139,92,246,.08) 0%,transparent 70%);pointer-events:none;z-index:0}
.sc{display:none;flex-direction:column;flex:1;overflow:hidden;position:relative;z-index:1}.sc.active{display:flex}
.sv{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:90px}.sv::-webkit-scrollbar{display:none}
#tb{background:var(--bg1);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--bd);display:flex;padding:10px 0;padding-bottom:calc(20px + env(safe-area-inset-bottom,48px));flex-shrink:0;position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;z-index:1000;box-sizing:border-box}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:none;border:none;padding:4px 0}
.tw{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.tb.active .tw{background:rgba(139,92,246,.15)}.tb .tl{font-size:10px;color:var(--mu);font-weight:600;font-family:var(--m);letter-spacing:.02em;transition:color .2s}.tb.active .tl{color:var(--a2)}
.hh{padding:calc(32px + env(safe-area-inset-top, 0px)) 20px 14px}
.hg{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:8px;font-family:var(--m)}
.ht{font-size:26px;font-weight:700;letter-spacing:-.4px;line-height:1.2;color:var(--t)}.ht span{background:linear-gradient(135deg,var(--a2),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ab{margin:0 16px 10px;background:rgba(251,191,36,.05);border:1px solid rgba(251,191,36,.16);border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.ad{width:5px;height:5px;border-radius:50%;background:var(--or);flex-shrink:0;box-shadow:0 0 8px rgba(251,191,36,.6)}.at{font-size:13px;font-weight:600;color:var(--or)}.as{font-size:11px;color:var(--mu);margin-top:1px}
.qp{margin:0 16px 14px;background:var(--bg2);border:1px solid var(--bd2);border-radius:13px;padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .2s,box-shadow .2s}
.qp:active{border-color:var(--a);box-shadow:0 0 0 3px var(--gl)}.qt{font-size:14px;color:var(--mu);flex:1}
.sl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);padding:0 20px;margin-bottom:8px;font-family:var(--m)}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:0 16px;margin-bottom:16px}
.sh{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:14px;cursor:pointer;display:flex;flex-direction:column;gap:10px;transition:border-color .15s,background .15s,transform .1s;position:relative;overflow:hidden;aspect-ratio:1.4/1}
.sh::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;opacity:0;transition:opacity .2s}
.sh:active{transform:scale(.95);background:var(--bg3)}.sh:active::after{opacity:1}
.sp::after{background:linear-gradient(90deg,transparent,var(--a2),transparent)}.st::after{background:linear-gradient(90deg,transparent,var(--gr),transparent)}.sa::after{background:linear-gradient(90deg,transparent,var(--or),transparent)}.sv2::after{background:linear-gradient(90deg,transparent,var(--a3),transparent)}.sr::after{background:linear-gradient(90deg,transparent,var(--re),transparent)}.sk::after{background:linear-gradient(90deg,transparent,#7dd3fc,transparent)}
.si{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.sp .si{background:rgba(139,92,246,.15)}.st .si{background:rgba(52,211,153,.12)}.sa .si{background:rgba(251,191,36,.1)}.sv2 .si{background:rgba(196,181,253,.1)}.sr .si{background:rgba(248,113,113,.1)}.sk .si{background:rgba(125,211,252,.1)}
.sn{font-size:13px;font-weight:600;color:var(--t);line-height:1.3}
.rw{margin:0 16px;background:var(--bg2);border:1px solid var(--bd);border-radius:13px;overflow:hidden}
.rr{padding:11px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--dv);cursor:pointer;transition:background .12s}.rr:last-child{border-bottom:none}.rr:active{background:var(--bg3)}
.rb{width:2px;height:26px;border-radius:2px;flex-shrink:0}.ri{flex:1;min-width:0}.rn{font-size:13px;font-weight:600;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.rs{font-size:10px;color:var(--mu);margin-top:1px;font-family:var(--m)}.rt{font-size:10px;color:var(--mu);flex-shrink:0;font-family:var(--m)}
.ch{background:var(--bg1);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--bd);padding:calc(14px + env(safe-area-inset-top, 0px)) 16px 12px;display:flex;flex-direction:column;align-items:center;flex-shrink:0;z-index:5}
.ct{font-size:15px;font-weight:700;color:var(--t)}.cm{font-size:10px;color:var(--mu);font-family:var(--m);margin-top:1px}
.pr{display:flex;gap:5px;padding:9px 14px 6px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}.pr::-webkit-scrollbar{display:none}
.pi{padding:5px 13px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid transparent;font-family:var(--f);transition:all .15s;flex-shrink:0}
.pi.active{background:rgba(139,92,246,.18);border-color:rgba(139,92,246,.5);color:var(--a3)}.pi.inactive{background:var(--bg2);border-color:var(--bd);color:var(--t2)}
#msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}#msgs::-webkit-scrollbar{display:none}
.msg{max-width:84%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.55;font-family:var(--f);font-weight:400;word-break:break-word}
.mu2{background:linear-gradient(140deg,var(--a),#7c3aed);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;font-weight:500;box-shadow:0 4px 18px rgba(139,92,246,.28)}
.mc{background:var(--bg2);border:1px solid var(--bd);color:var(--t);align-self:flex-start;border-bottom-left-radius:4px}
.ms{background:rgba(139,92,246,.05);border:1px solid var(--bd);color:var(--mu);align-self:center;font-size:11px;padding:4px 12px;border-radius:8px;text-align:center;max-width:90%;font-family:var(--m)}
.mt{background:var(--bg2);border:1px solid var(--bd);align-self:flex-start;border-bottom-left-radius:4px;padding:14px 16px}
.td{display:flex;gap:5px;align-items:center}.td span{width:6px;height:6px;background:var(--a);border-radius:50%;animation:bounce 1.2s infinite;opacity:.7}.td span:nth-child(2){animation-delay:.2s}.td span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.7}30%{transform:translateY(-5px);opacity:1}}
.es{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px 30px;text-align:center}
.eg{width:48px;height:48px;border-radius:14px;background:rgba(139,92,246,.08);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.et{font-size:16px;font-weight:700;color:var(--t2)}.eb{font-size:13px;color:var(--mu);line-height:1.6}
.su{padding:0 14px 8px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}.su::-webkit-scrollbar{display:none}
.cp{padding:6px 12px;border-radius:20px;background:var(--bg2);color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bd);font-family:var(--f);transition:all .15s;white-space:nowrap;flex-shrink:0}
.cp:active{background:rgba(139,92,246,.18);border-color:var(--a);color:var(--a3)}
.ia{background:var(--bg1);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--bd);padding:10px 14px;padding-bottom:calc(10px + env(safe-area-inset-bottom,48px));flex-shrink:0}
.ir{display:flex;align-items:center;gap:4px;background:var(--bg2);border:1px solid var(--bd2);border-radius:20px;padding:7px 8px;transition:border-color .2s,box-shadow .2s}.ir:focus-within{border-color:var(--a);box-shadow:0 0 0 3px var(--gl)}
#ci{flex:1;font-size:14px;color:var(--t);background:transparent;border:none;outline:none;font-family:var(--f);resize:none;max-height:120px;line-height:1.5;min-height:22px}#ci::placeholder{color:var(--mu)}
.ib{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;flex-shrink:0;transition:background .12s,transform .1s}.ib:active{transform:scale(.88)}
.ig{background:transparent}.ig:active{background:var(--bg3)}.iat{background:var(--bg3)}.iat:active{background:var(--bg4)}.is{background:var(--a);box-shadow:0 2px 14px rgba(139,92,246,.38)}.is:disabled{background:var(--bg3);box-shadow:none}
.fp{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:7px 12px;display:flex;align-items:center;gap:8px;align-self:flex-end;max-width:82%}.fp span{font-size:12px;color:var(--t2);font-family:var(--m)}
.sh2{padding:calc(32px + env(safe-area-inset-top, 0px)) 20px 16px;border-bottom:1px solid var(--bd)}.st2{font-size:24px;font-weight:700;letter-spacing:-.3px}
.pc{margin:16px 16px 0;background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px}
.pav{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,var(--a),#7c3aed);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 4px 16px rgba(139,92,246,.3);font-family:var(--m)}
.pn{font-size:15px;font-weight:700;color:var(--t)}.ps{font-size:11px;color:var(--mu);margin-top:3px;font-family:var(--m);display:flex;align-items:center;gap:5px}
.ss{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);padding:16px 20px 8px;font-family:var(--m)}
.cl{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;overflow:hidden;margin:0 16px}
.cr{padding:13px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--dv);cursor:pointer;transition:background .12s}.cr:last-child{border-bottom:none}.cr:active{background:var(--bg3)}
.rd{width:7px;height:7px;border-radius:50%;flex-shrink:0}.rtt{font-size:14px;font-weight:600;color:var(--t)}.rsb{font-size:11px;color:var(--mu);margin-top:2px;font-family:var(--m)}.rc{margin-left:auto}
.tg{width:38px;height:22px;border-radius:11px;position:relative;cursor:pointer;flex-shrink:0;margin-left:auto;transition:background .2s,box-shadow .2s;border:1px solid var(--bd2)}
.tg.on{background:var(--a);border-color:var(--a);box-shadow:0 0 10px rgba(139,92,246,.35)}.tg.off{background:var(--bg4)}
.tk{position:absolute;top:2px;width:16px;height:16px;background:#fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.4);transition:left .2s}.tg.on .tk{left:calc(100% - 18px)}.tg.off .tk{left:2px}
.uc{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:14px;margin:0 16px}
.ut{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}.ul{font-size:13px;font-weight:600;color:var(--t2)}.uv{font-size:13px;color:var(--a2);font-weight:700;font-family:var(--m)}.ub{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}.uf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--a),var(--a3));transition:width .5s}.us{font-size:11px;color:var(--mu);margin-top:6px;font-family:var(--m)}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}.ov.show{display:flex}
.mo{background:var(--bg1);border:1px solid var(--bd2);border-top:1px solid rgba(139,92,246,.3);border-radius:20px 20px 0 0;padding:22px 20px calc(30px + env(safe-area-inset-bottom));width:100%;max-width:430px;animation:su .26s cubic-bezier(.34,1.2,.64,1)}
@keyframes su{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{width:30px;height:3px;background:var(--bg4);border-radius:2px;margin:0 auto 18px}.mti{font-size:17px;font-weight:700;color:var(--t);margin-bottom:6px}.msb{font-size:13px;color:var(--mu);margin-bottom:16px;line-height:1.5}
.mi{width:100%;background:var(--bg2);border:1px solid var(--bd2);border-radius:11px;padding:12px 14px;font-size:13px;color:var(--t);font-family:var(--m);outline:none;margin-bottom:12px}.mi:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--gl)}.mi::placeholder{color:var(--mu)}
.mb{width:100%;padding:13px;border-radius:11px;border:none;font-size:14px;font-weight:700;font-family:var(--f);cursor:pointer;margin-bottom:8px;transition:opacity .15s,transform .1s}.mb:active{transform:scale(.98);opacity:.9}
.mbp{background:var(--a);color:#fff;box-shadow:0 4px 16px rgba(139,92,246,.3)}.mbs{background:var(--bg3);color:var(--t2)}
.pvbadge{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:5px 10px;margin-bottom:14px;font-size:11px;font-weight:600;color:var(--t2);font-family:var(--m)}
.pvdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.mo2{background:var(--bg2);border:1px solid var(--bd);border-radius:11px;padding:12px 13px;cursor:pointer;transition:border-color .15s,background .15s;display:flex;align-items:center;gap:12px;margin-bottom:8px}.mo2.active{border-color:var(--a);background:rgba(139,92,246,.07)}.mo2:active{opacity:.8}
.mdo{width:7px;height:7px;border-radius:50%;flex-shrink:0}.mn{font-size:13px;font-weight:700;color:var(--t);font-family:var(--m)}.md{font-size:11px;color:var(--mu);margin-top:2px}.mck{margin-left:auto;color:var(--a2);font-size:13px;font-weight:700}
.toast{position:fixed;bottom:calc(100px + env(safe-area-inset-bottom, 0px));left:50%;transform:translateX(-50%) translateY(6px);background:var(--bg2);border:1px solid var(--bd2);border-radius:10px;padding:8px 16px;font-size:12px;font-weight:600;color:var(--t);z-index:200;opacity:0;transition:opacity .22s,transform .22s;white-space:nowrap;font-family:var(--m);pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#fi{display:none}.sd{width:5px;height:5px;border-radius:50%;display:inline-block}
</style>
</head>
